<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER BOYZ // REFLEX TEST</title>
    <style>
        body {
            background-color: #05050a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 600px;
            margin: 50px auto;
            border: 2px solid #00ff66;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            background: rgba(10, 10, 15, 0.9);
        }
        #target {
            width: 100px;
            height: 100px;
            background-color: #ff007f; /* Neon Pink when waiting */
            margin: 30px auto;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 15px #ff007f;
            transition: transform 0.1s;
        }
        #target.active {
            background-color: #00ff66; /* Neon Green when it's time to click! */
            box-shadow: 0 0 25px #00ff66;
        }
        .btn {
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            text-shadow: 0 0 5px #00ff66;
        }
        .btn:hover {
            background: #00ff66;
            color: #05050a;
        }

        .score-box {
            position: relative;
            display: inline-block;
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff66;
            letter-spacing: 5px;
        }

        /* This is a invisible background layer that only aligns perfectly if the score is 3 digits (e.g., 250ms) */
        .score-box::before {
            content: "XXXms";
            position: absolute;
            left: 0;
            top: 0;
            color: rgba(255, 255, 255, 0.03); /* Ghost text */
            pointer-events: none;
        }

        #result {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h2>[ SYSTEM REFLEX TEST ]</h2>
    <p>Click "START NETWORK SCAN". Wait for the box to turn <span style="color: #00ff66;">GREEN</span>, then click it instantly!</p>
    
    <button class="btn" id="startBtn" onclick="startGame()">START NETWORK SCAN</button>
    
    <div id="target" onclick="clickTarget()"></div>
    <div id="result">TIME: 0ms</div>
    
    <br><br>
    <a href="index.html" style="color: #ff007f; text-decoration: none;">← Return to HQ</a>
</div>

<script>
    let startTime;
    let timer;
    const target = document.getElementById('target');
    const resultDisplay = document.getElementById('result');
    const startBtn = document.getElementById('startBtn');

    function startGame() {
        startBtn.style.display = 'none';
        resultDisplay.innerText = "WAIT FOR IT...";
        target.style.display = 'block';
        target.classList.remove('active');
        
        // Random delay between 2 to 5 seconds before turning green
        let randomDelay = Math.random() * 3000 + 2000;
        
        timer = setTimeout(() => {
            target.classList.add('active');
            startTime = Date.now();
        }, randomDelay);
    }

        function clickTarget() {
            if (target.classList.contains('active')) {
                let endTime = Date.now();
                let reactionTime = endTime - startTime;
                resultDisplay.innerText = `SUCCESS! RESPONSE TIME: ${reactionTime}ms`;
                target.classList.remove('active');
                startBtn.style.display = 'inline-block';
                startBtn.innerText = "TRY AGAIN";
            } else {
                // Player clicked too early!
                clearTimeout(timer);
                resultDisplay.innerText = "SYSTEM MALFUNCTION: CLICKED TOO EARLY!";
                target.style.display = 'none';
                startBtn.style.display = 'inline-block';
                startBtn.innerText = "RESTART SYSTEM";
            }
        }

    function clickTarget() {
        if (target.classList.contains('active')) {
            let endTime = Date.now();
            let reactionTime = endTime - startTime;
            
            // 🚨 THE ANTI-SCAMMER TRAP
            if (reactionTime < 100) {
                resultDisplay.innerHTML = `
                    <div style="color: #ff0055; font-size: 1.5rem; font-weight: bold; margin-top: 20px; animation: blink 0.5s infinite;">
                        🛑 [ DETECTED UNUSUAL ACTIVITY ]
                    </div>
                    <p style="color: #ffffff; font-size: 1.2rem; margin: 15px 0;">
                        Nice try, මச்சான்! 💻❌<br>
                        Biology says your brain takes 120ms just to blink. 
                        Your ${reactionTime}ms score means you are either a robot or using Inspect Element.
                    </p>
                    <div style="background: rgba(255, 0, 85, 0.2); padding: 10px; border: 1px solid #ff0055; font-size: 0.9rem; color: #ffcc00;">
                        SCAM ALERT: Report filed to SnapDrago27 Server Admin. 🤫
                    </div>
                `;
                target.style.display = 'none';
                startBtn.style.display = 'inline-block';
                startBtn.innerText = "RESET NETWORK (LEGIT ONLY)";
                return;
            }

            // Inside your clickTarget() function where the score is legitimate:
            let now = new Date();
            let timeString = now.toLocaleTimeString();

            // We wrap the number inside a specific structure that breaks visually if edited
            resultDisplay.innerHTML = `
                <div style="font-size: 1.2rem; color: #ffffff; margin-bottom: 10px;">SUCCESS! RESPONSE TIME:</div>
                <div class="score-box" id="verified-score">${reactionTime}ms</div>
                <br>
                <span style="font-size: 0.75rem; color: #ff007f; letter-spacing: 1px;">
                    SECURE_HASH: CB-${reactionTime * 3}-${timeString.replace(/:/g, '')}
                </span>
            `;
            
            target.classList.remove('active');
            startBtn.style.display = 'inline-block';
            startBtn.innerText = "TRY AGAIN";
        } else {
            clearTimeout(timer);
            resultDisplay.innerText = "SYSTEM MALFUNCTION: CLICKED TOO EARLY!";
            target.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.innerText = "RESTART SYSTEM";
        }
    }


</script>

</body>
</html>
